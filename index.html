/* ============================================================
   MOBILE / TOUCH-DEVICE OPTIMIZATIONS
   ============================================================ */

/* All interactive elements: prevent 300ms tap delay, disable
   text-selection on long-press, and ensure a 44x44px minimum
   touch target (Apple HIG) */
button,
.mode-btn,
.nav-btn,
.back-btn,
.audio-btn,
.mic-btn{
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}

/* Only apply :hover effects on devices that actually have hover
   (desktop with mouse). On touch devices, :hover would "stick"
   after tapping because the device thinks the finger is still
   hovering over the element. */
@media (hover:hover) and (pointer:fine){
  /* hover styles already defined earlier are only active here */
}
@media (hover:none){
  .mode-btn:hover,
  .nav-btn:hover,
  .primary-btn:hover,
  .secondary-btn:hover,
  .back-btn:hover,
  .audio-btn:hover,
  .mic-btn:hover{
    transform:none !important;
    background:inherit;
  }
  /* Restore the non-hover background explicitly for each */
  .mode-btn:hover{
    background:linear-gradient(135deg,rgba(59,130,246,0.3),rgba(37,99,235,0.2));
    border-color:rgba(147,197,253,0.3);
  }
  .primary-btn:hover{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
  }
  .secondary-btn:hover{
    background:rgba(255,255,255,0.1);
  }
  .back-btn:hover{
    background:transparent;
  }
  .audio-btn:hover{
    background:rgba(59,130,246,0.2);
  }
  .mic-btn:hover{
    background:rgba(239,68,68,0.2);
  }
}

/* Give visual feedback on touch/tap via :active since we can't
   rely on :hover */
.mode-btn:active,
.nav-btn:active,
.back-btn:active,
.audio-btn:active,
.mic-btn:active{
  transform:scale(0.97);
  transition:transform 0.08s ease;
}

/* On narrow phones, tighten spacing and typography so more
   content fits without horizontal overflow */
@media (max-width:480px){
  .container{padding:14px;padding-bottom:max(40px,env(safe-area-inset-bottom))}
  h1{font-size:1.45rem;line-height:1.25}
  .subtitle{font-size:0.85rem}
  .card{padding:18px;border-radius:14px}
  .mode-btn{padding:16px;gap:12px}
  .mode-icon{font-size:1.7rem;width:42px}
  .mode-text h3{font-size:1rem}
  .mode-text p{font-size:0.85rem}
  .question-text{font-size:1.1rem;line-height:1.4}
  .nav-btn{padding:14px 16px;font-size:0.95rem}
  .btn-row{gap:8px}
  .review-item{padding:12px}
  .results-score{font-size:2.2rem}
}

/* When the on-screen keyboard opens, the fixed-height pulse
   animation can cause layout thrash. Reduce the ring spread. */
@media (max-width:480px){
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)}
    50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}
  }
}

/* Respect the user's reduced-motion preference */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

      IMPORTANT: change "/viewform" in the URL to "/formResponse"
      when you paste it below — that's the submit endpoint.

   If you leave CONTACT_FORM.enabled as false, the contact form

/* Contact submission handler — fires the Google Form in the background.
   We use a hidden <form> + iframe trick because Google Forms blocks CORS
   on fetch(), but a native form POST into a hidden iframe succeeds. */
function submitContact(){
  if(!CONTACT_FORM.enabled){
    state.contactError='Contact form is not set up yet.';
    render();
    return;
  }
  const name=(state.contactName||'').trim();
  const email=(state.contactEmail||'').trim();
  const phone=(state.contactPhone||'').trim();
  if(!state.contactConsent){
    state.contactError='Please check the consent box to continue.';
    render();
    return;
  }
  if(!email && !phone){
    state.contactError='Please enter an email address or a phone number.';
    render();
    return;
  }
  // Very loose email validation — Google Forms will do its own
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    state.contactError='Please enter a valid email address.';
    render();
    return;
  }
  state.contactSubmitting=true;
  state.contactError=null;
  render();

  // Create a hidden iframe + form and submit into it
  let iframe=document.getElementById('contact-sink');
  if(!iframe){
    iframe=document.createElement('iframe');
    iframe.name='contact-sink';
    iframe.id='contact-sink';
    iframe.style.display='none';
    document.body.appendChild(iframe);
  }
  const form=document.createElement('form');
  form.action=CONTACT_FORM.formUrl;
  form.method='POST';
  form.target='contact-sink';
  form.style.display='none';
  const add=(key,value)=>{
    if(!key||value==null||value==='') return;
    const inp=document.createElement('input');
    inp.type='hidden';
    inp.name=key;
    inp.value=value;
    form.appendChild(inp);
  };
  add(CONTACT_FORM.entries.name, name);
  add(CONTACT_FORM.entries.email, email);
  add(CONTACT_FORM.entries.phone, phone);
  document.body.appendChild(form);
  form.submit();

  // We can't truly know if Google received it (CORS hides the response)
  // but within ~1 second we can assume success and show thank you.
  setTimeout(()=>{
    state.contactSubmitting=false;
    state.contactSubmitted=true;
    state.contactError=null;
    // Try to persist so we don't re-prompt the same user next time.
    try{
      if(window.storage && typeof window.storage.set==='function'){
        window.storage.set('contact_submitted','1').catch(()=>{});
      }else{
        // Fallback for plain browsers: this won't persist across sessions
        // (artifact storage isn't available outside Claude), but the
        // sessionState flag still prevents re-prompt within one visit.
      }
    }catch(e){}
    // Clean up form
    try{ form.remove(); }catch(e){}
    render();
  }, 1200);
}

function setContactField(field, value){
  state['contact'+field.charAt(0).toUpperCase()+field.slice(1)]=value;
  // Don't re-render on every keystroke — it would blow away input focus
  // and the IME composition. Form inputs update their own DOM directly.
}

function toggleContactConsent(checked){
  state.contactConsent=checked;
  // Re-render so the submit button enables/disables
  render();
}

function minimizeContactForm(){
  state.contactMinimized=true;
  render();
}

function expandContactForm(){
  state.contactMinimized=false;
  render();
}

/* On page load, check if this user has previously submitted. If so,
   silently hide the form. */
(function restoreContactState(){
  try{
    if(window.storage && typeof window.storage.get==='function'){
      window.storage.get('contact_submitted').then(r=>{
        if(r && r.value==='1'){
          state.contactSubmitted=true;
          render();
        }
      }).catch(()=>{});
    }
  }catch(e){}
})();

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// Detect platform for speech-recognition compatibility.
// iOS Safari does NOT support Web Speech Recognition (as of 2026).
// Chrome on iOS also uses WebKit under the hood, so it's the same.
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

function speak(text){
  if('speechSynthesis' in window){
    try{
      window.speechSynthesis.cancel();
      // iOS Safari sometimes pauses the synth queue — resume first
      if(window.speechSynthesis.paused){
        window.speechSynthesis.resume();
      }
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.rate=0.85;
      utterance.pitch=1;
      utterance.lang='en-US';
      window.speechSynthesis.speak(utterance);
    }catch(e){
      console.warn('speech synthesis failed:',e);
    }
  }
}

// Look up the current question from state and speak it. Avoids
// the quoting-nightmare of interpolating the question text into
// an onclick attribute.
function speakCurrentQuestion(){
  let q;
  if(state.phase==='personal'){
    q=state.personalQuestions[state.currentIndex];
  }else if(state.phase==='tricky'){
    q=state.trickyQuestions[state.currentIndex];
  }else{
    q=state.civicsQuestions[state.currentIndex];
  }
  if(q && q.q){
    speak(q.q);
  }
}

function initSpeechRecognition(){
  if('webkitSpeechRecognition' in window || 'SpeechRecognition' in window){
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    state.recognition=new SpeechRecognition();
    state.recognition.continuous=true;
    state.recognition.interimResults=true;
    state.recognition.lang='en-US';
    
    state.recognition.onresult=(event)=>{
      let transcript='';
      for(let i=0;i<event.results.length;i++){
        transcript+=event.results[i][0].transcript;
      }
      state.spokenText=transcript;
      render();
    };
    
    state.recognition.onerror=(event)=>{
      console.log('Speech recognition error:',event.error);
      state.isRecording=false;
      if(event.error==='not-allowed'){
        state.micError='not-allowed';
        state.micGranted=false;
      }else if(event.error==='no-speech'){
        state.micError='no-speech';
      }else{
        state.micError=event.error;
      }
      render();
    };
    
    state.recognition.onend=()=>{
      state.isRecording=false;
      render();
    };
  }
}

// Proactively check if mic permission has already been granted
// (e.g. from a previous visit where the user ticked "Remember").
// If so, skip the "Grant microphone access" button and go straight
// to practice mode.
function checkMicPermission(){
  if(navigator.permissions && navigator.permissions.query){
    navigator.permissions.query({name:'microphone'}).then(result=>{
      if(result.state==='granted'){
        state.micGranted=true;
        render();
      }
      // Listen for permission changes (user toggles in settings)
      result.onchange=()=>{
        state.micGranted=(result.state==='granted');
        render();
      };
    }).catch(()=>{
      // Some browsers don't support the 'microphone' permission name —
      // we just fall back to the button-prompted flow.
    });
  }
}

// Ask for microphone access ONCE. Keep the returned stream alive for
// the whole session so the browser doesn't re-prompt on later recordings.
// Called from a user gesture (button tap) so the permission dialog
// shows at a predictable moment rather than mid-question.
function requestMicOnce(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // Older browser without getUserMedia — just flip the flag and let
    // SpeechRecognition prompt on its own when the user taps the mic button.
    state.micGranted=true;
    state.micError=null;
    render();
    return;
  }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    // Keep the stream in state so the mic permission "sticks" for the
    // duration of the session. Don't stop its tracks here — stopping them
    // is what causes some browsers to re-prompt next time.
    state.micStream=stream;
    state.micGranted=true;
    state.micError=null;
    render();
  }).catch(err=>{
    console.log('Microphone permission denied or error:',err);
    state.micError='not-allowed';
    state.micGranted=false;
    render();
  });
}

function getMicErrorMessage(){
  if(state.micError==='not-allowed'){
    return `<div class="error-box">
      <div class="error-title">🎤 Microphone Access Blocked</div>
      <div class="error-text">
        <strong>To enable voice practice without being asked again:</strong><br><br>
        <strong>Chrome / Edge (desktop):</strong> Click the 🔒 lock icon in the address bar → Microphone → Allow → Reload the page.<br><br>
        <strong>Chrome on Android:</strong> Tap the ⋮ menu → Permissions → Microphone → Allow. When asked next time, tap <strong>"While using the app"</strong> (not "Only this time") so it remembers.<br><br>
        <strong>Safari on iPhone/iPad:</strong> In-browser microphone recognition isn't supported on iOS. You can still practice by speaking answers out loud and using the 🔊 button to hear questions.
      </div>
    </div>`;
  }else if(state.micError==='no-speech'){
    return `<div class="warning-box">
      <div class="warning-text">No speech detected. Try speaking louder or closer to your microphone.</div>
    </div>`;
  }else if(state.micError){
    return `<div class="warning-box">
      <div class="warning-text">Microphone error: ${state.micError}. Try refreshing the page.</div>
    </div>`;
  }
  return '';
}

function toggleRecording(){
  if(!state.recognition)return;
  
  if(state.isRecording){
    state.recognition.stop();
    state.isRecording=false;
  }else{
    state.spokenText='';
    state.micError=null;
    state.isRecording=true;
    try{
      state.recognition.start();
    }catch(e){
      console.error('Recognition error:',e);
      state.isRecording=false;
      state.micError=e.message||'unknown';
    }
  }
  render();
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='home'){
    app.innerHTML=renderHome();
  }else if(state.screen==='interview'){
    app.innerHTML=renderInterview();
  }else if(state.screen==='results'){
    app.innerHTML=renderResults();
  }
}

// Escape user-typed text so it's safe to put back into an HTML
// attribute value (needed for re-renders that preserve input).
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function renderInterview(){
  let questions,currentQ,phaseLabel;
  
  if(state.phase==='personal'){
    questions=state.personalQuestions;
    currentQ=questions[state.currentIndex];
    phaseLabel='Personal Questions';
  }else if(state.phase==='tricky'){
    questions=state.trickyQuestions;
    currentQ=questions[state.currentIndex];
    phaseLabel='Tricky Follow-up Questions';
  }else{
    questions=state.civicsQuestions;
    currentQ=questions[state.currentIndex];
    phaseLabel='Civics Questions';
  }
  
  const total=questions.length;
  const progress=((state.currentIndex+1)/total)*100;
  const isCivics=state.phase==='civics';
  
  return `
    <button class="back-btn" onclick="backToHome()">← Back to Home</button>
    
    <div class="card">
      <span class="phase-label">${phaseLabel}</span>
      
      <div class="progress-text">Question ${state.currentIndex+1} of ${total}</div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
      
      <div class="officer-card">
        <div class="officer-badge">
          <span>👮</span>
          <span>USCIS Officer</span>
        </div>
        <div class="question-text">${currentQ.q}</div>
      </div>
      
      <button class="audio-btn" onclick="speakCurrentQuestion()">
        🔊 Listen to Question
      </button>
      
      ${currentQ.tip?`
        <div class="tip-box">
          <div class="tip-label">💡 Tip</div>
          <div class="tip-text">${currentQ.tip}</div>
        </div>
      `:''}
      
      ${currentQ.sample?`
        <div class="sample-box">
          <div class="sample-label">📝 Example Answer</div>
          <div class="sample-text">"${currentQ.sample}"</div>
        </div>
      `:''}
      
      ${isCivics && state.showingAnswer?`
        <div class="answer-box">
          <div class="answer-label">✅ Correct Answer</div>
          <div class="answer-text">${currentQ.a}</div>
        </div>
      `:''}
      
      ${state.recognition?`
        ${getMicErrorMessage()}
        <div style="text-align:center;">
          <button class="mic-btn ${state.isRecording?'recording':''}" onclick="toggleRecording()">
            ${state.isRecording?'🔴 Stop Recording':'🎤 Speak Your Answer'}
          </button>
        </div>
        
        ${state.spokenText?`
          <div class="spoken-label">Your answer:</div>
          <div class="spoken-text">${state.spokenText}</div>
        `:''}
      `:`
        <div class="warning-box" style="margin-top:15px;">
          <div class="warning-text">
            🎤 <strong>Voice practice not available on this device.</strong><br>
            ${IS_IOS
              ? `iPhone and iPad Safari don't support in-browser speech recognition. You can still practice by saying your answer <em>out loud</em>, then checking your answer below. For voice recording, try this app on a Chrome or Edge browser on a computer or Android phone.`
              : `Your browser doesn't support in-browser speech recognition. Try the latest Chrome or Edge. You can still practice by saying your answer out loud and checking it below.`}
          </div>
        </div>
      `}
      
      ${isCivics?`
        ${!state.showingAnswer?`
          <div class="btn-row">
            <button class="nav-btn secondary-btn" onclick="showAnswer()">Show Answer</button>
          </div>
        `:`
          <div class="btn-row">
            <button class="nav-btn success-btn" onclick="markAnswer(true)">✓ I Got It</button>
            <button class="nav-btn danger-btn" onclick="markAnswer(false)">✗ Need Practice</button>
          </div>
        `}
      `:`
        <div class="btn-row">
          <button class="nav-btn primary-btn" onclick="nextQuestion()" style="width:100%">
            ${state.currentIndex<total-1?'Next Question →':'Finish'}
          </button>
        </div>
      `}
    </div>
  `;
}

function renderResults(){
  const correct=state.civicsAnswers.filter(a=>a).length;
  const total=state.civicsQuestions.length;
  // 2025 test: 12 correct out of 20 to pass (60%)
  const passThreshold=12;
  const passed=correct>=passThreshold;
  const percentage=Math.round((correct/total)*100);
  
  const review=state.civicsQuestions.map((q,i)=>`
    <div class="review-item ${state.civicsAnswers[i]?'correct':'incorrect'}">
      <div class="review-q">${q.q}</div>
      <div class="review-a">${q.a}</div>
    </div>
  `).join('');
  
  return `
    <div class="card">
      <div class="results-card">
        <div class="results-icon">${passed?'🎉':'📚'}</div>
        <div class="results-title">${passed?'Congratulations!':'Keep Practicing!'}</div>
        <div class="results-score">${correct} / ${total}</div>
        <div style="font-size:1.3rem;margin-bottom:15px;">${percentage}% Correct</div>
        <div class="results-message">
          ${passed?`You passed! You answered ${passThreshold} or more questions correctly on the 2025 civics test. Great job!`:`You need ${passThreshold} correct answers out of ${total} to pass the 2025 civics test. Keep practicing — you can do it!`}
        </div>
        
        <div class="disclaimer-box" style="text-align:left;">
          <div class="disclaimer-title">ℹ️ Reminder</div>
          <div class="disclaimer-text">
            This is a <strong>practice result only</strong>. It <strong>does not guarantee</strong> you will pass the official USCIS test. This app is not affiliated with USCIS or any government agency.
          </div>
        </div>
        
        <div style="text-align:left;">
          <h3 style="margin-bottom:15px;font-family:'Merriweather',serif;">Review Your Answers:</h3>
          ${review}
        </div>
        
        <div style="margin-top:25px;">
          <button class="nav-btn primary-btn" onclick="backToHome()" style="width:100%;">
            Try Another Interview
          </button>
        </div>
      </div>
    </div>
  `;
}

function startMode(mode){
  state.mode=mode;
  state.screen='interview';
  state.currentIndex=0;
  state.showingAnswer=false;
  state.spokenText='';
  state.civicsAnswers=[];
  
  if(mode==='personal'){
    state.phase='personal';
    state.personalQuestions=shuffle(PERSONAL_QUESTIONS).slice(0,6);
  }else if(mode==='tricky'){
    state.phase='tricky';
    state.trickyQuestions=shuffle(TRICKY_QUESTIONS).slice(0,8);
  }else if(mode==='civics'){
    state.phase='civics';
    state.civicsQuestions=shuffle(CIVICS_QUESTIONS).slice(0,20);
  }else if(mode==='full'){
    state.phase='personal';
    state.personalQuestions=shuffle(PERSONAL_QUESTIONS).slice(0,6);
    state.trickyQuestions=shuffle(TRICKY_QUESTIONS).slice(0,4);
    state.civicsQuestions=shuffle(CIVICS_QUESTIONS).slice(0,20);
  }
  
  render();
}

function backToHome(){
  if(state.recognition && state.isRecording){
    state.recognition.stop();
  }
  window.speechSynthesis.cancel();
  state.screen='home';
  state.mode=null;
  state.phase='personal';
  state.currentIndex=0;
  state.spokenText='';
  state.isRecording=false;
  render();
}

function nextQuestion(){
  if(state.recognition && state.isRecording){
    state.recognition.stop();
    state.isRecording=false;
  }
  state.spokenText='';
  
  let questions;
  if(state.phase==='personal'){
    questions=state.personalQuestions;
  }else if(state.phase==='tricky'){
    questions=state.trickyQuestions;
  }else{
    questions=state.civicsQuestions;
  }
  
  if(state.currentIndex<questions.length-1){
    state.currentIndex++;
  }else{
    // Move to next phase or finish
    if(state.mode==='full'){
      if(state.phase==='personal'){
        state.phase='tricky';
        state.currentIndex=0;
      }else if(state.phase==='tricky'){
        state.phase='civics';
        state.currentIndex=0;
      }else{
        state.screen='results';
      }
    }else if(state.mode==='tricky'){
      backToHome();
      alert('Great job practicing the tricky questions!');
      return;
    }else{
      backToHome();
      alert('Great job practicing!');
      return;
    }
  }
  
  render();
}

function showAnswer(){
  state.showingAnswer=true;
  render();
}

function markAnswer(correct){
  state.civicsAnswers[state.currentIndex]=correct;
  state.showingAnswer=false;
  state.spokenText='';
  
  if(state.recognition && state.isRecording){
    state.recognition.stop();
    state.isRecording=false;
  }
  
  if(state.currentIndex<state.civicsQuestions.length-1){
    state.currentIndex++;
  }else{
    state.screen='results';
  }
  
  render();
}

// Initialize
initSpeechRecognition();
checkMicPermission();
render();
</script>
